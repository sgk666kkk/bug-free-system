<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>智能化出运系统 - 药剂管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#f4f6f8;color:#333}
.login{max-width:400px;margin:50px auto;padding:0 20px}
.login-box{background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-box h2{margin-bottom:20px;text-align:center;color:#1e6bff}
.form-item{margin-bottom:15px}
.form-item label{display:block;margin-bottom:6px;font-weight:500}
.form-item input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px}
.btn{width:100%;padding:12px;background:#1e6bff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin-top:10px}
.btn:hover{background:#0d5aff}
.main{display:none;padding:15px;max-width:1200px;margin:0 auto}
.header{background:#1e6bff;color:#fff;padding:18px 20px;border-radius:10px;margin-bottom:20px}
.header h1{font-size:22px}
.header p{font-size:14px;margin-top:4px;opacity:.9}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.tab{flex:1;min-width:100px;padding:12px;text-align:center;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.tab.active{background:#1e6bff;color:#fff;border-color:#1e6bff}
.page{display:none;background:#fff;padding:22px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.page.show{display:block}
.page h3{margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #eee}
.group{margin-bottom:15px}
.group label{display:block;margin-bottom:6px;font-weight:500}
.group input,.group select,.group textarea{width:100%;padding:11px;border:1px solid #ddd;border-radius:8px}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table th,.table td{border:1px solid #eee;padding:11px;text-align:center}
.table th{background:#f8f9fa}
.logout{margin-top:20px;text-align:right}
#logout{padding:8px 16px;background:#ff4d4f;color:#fff;border:none;border-radius:6px;cursor:pointer}
</style>
</head>
<body>

<!-- 登录 -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>智能化出运系统</h2>
    <div class="form-item">
      <label>账号</label>
      <input type="text" id="user" placeholder="请输入账号">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="password" id="pwd" placeholder="请输入密码">
    </div>
    <button class="btn" onclick="login()">登录系统</button>
  </div>
</div>

<!-- 主界面 -->
<div class="main" id="mainPage">
  <div class="header">
    <h1>药剂管理出运系统</h1>
    <p>智能化出运 | 入库 | 出运 | 库存 | 记录</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="go(0)">首页</div>
    <div class="tab" onclick="go(1)">药剂入库</div>
    <div class="tab" onclick="go(2)">药剂出运</div>
    <div class="tab" onclick="go(3)">库存管理</div>
    <div class="tab" onclick="go(4)">记录查询</div>
  </div>

  <!-- 0 首页 -->
  <div class="page show">
    <h3>系统概览</h3>
    <p>当前状态：正常运行</p>
    <p style="margin-top:8px">功能模块：药剂信息、入库登记、出运申请、库存查看、历史记录</p>
  </div>

  <!-- 1 入库 -->
  <div class="page">
    <h3>药剂入库登记</h3>
    <div class="group"><label>药剂名称</label><input type="text" placeholder="名称"></div>
    <div class="group"><label>规格型号</label><input type="text" placeholder="规格"></div>
    <div class="group"><label>入库数量</label><input type="number" placeholder="数量"></div>
    <div class="group"><label>生产厂家</label><input type="text" placeholder="厂家"></div>
    <div class="group"><label>入库时间</label><input type="datetime-local"></div>
    <div class="group"><label>备注</label><textarea rows="3"></textarea></div>
    <button class="btn">提交入库</button>
  </div>

  <!-- 2 出运 -->
  <div class="page">
    <h3>药剂出运申请</h3>
    <div class="group">
      <label>药剂名称</label>
      <select><option>请选择</option><option>药剂A</option><option>药剂B</option><option>药剂C</option></select>
    </div>
    <div class="group"><label>出运数量</label><input type="number" placeholder="数量"></div>
    <div class="group"><label>使用单位</label><input type="text" placeholder="单位/项目"></div>
    <div class="group"><label>出运时间</label><input type="datetime-local"></div>
    <div class="group"><label>用途说明</label><textarea rows="3"></textarea></div>
    <button class="btn">提交出运</button>
  </div>

  <!-- 3 库存 -->
  <div class="page">
    <h3>当前库存</h3>
    <table class="table">
      <tr><th>序号</th><th>药剂名称</th><th>规格</th><th>库存</th><th>厂家</th></tr>
      <tr><td>1</td><td>药剂A</td><td>标准</td><td>100</td><td>XX科技</td></tr>
      <tr><td>2</td><td>药剂B</td><td>工业</td><td>50</td><td>XX化工</td></tr>
    </table>
  </div>

  <!-- 4 记录 -->
  <div class="page">
    <h3>出入库记录</h3>
    <table class="table">
      <tr><th>时间</th><th>类型</th><th>药剂</th><th>数量</th><th>操作人</th></tr>
      <tr><td>2026-03-14</td><td>入库</td><td>药剂A</td><td>+50</td><td>管理员</td></tr>
      <tr><td>2026-03-14</td><td>出运</td><td>药剂B</td><td>-10</td><td>操作员</td></tr>
    </table>
  </div>

  <div class="logout"><button id="logout" onclick="logout()">退出登录</button></div>
</div>

<script>
function login(){
  document.getElementById('loginPage').style.display='none'
  document.getElementById('mainPage').style.display='block'
}
function logout(){
  document.getElementById('mainPage').style.display='none'
  document.getElementById('loginPage').style.display='block'
}
const tabs=document.querySelectorAll('.tab');
const pages=document.querySelectorAll('.page');
function go(i){
  tabs.forEach((t,j)=>{t.classList.toggle('active',j===i)});
  pages.forEach((p,j)=>{p.classList.toggle('show',j===i)});
}
</script>
</body>
</html>
